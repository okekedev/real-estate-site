<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Kayle Baker Real Estate | Wichita Falls, TX</title>
  <meta name="description" content="Browse Kayle Baker's real estate portfolio — homes, families, and community in Wichita Falls, TX.">
  <link rel="canonical" href="https://kaylebaker.com/portfolio/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kaylebaker.com/portfolio/">
  <meta property="og:title" content="Portfolio — Kayle Baker Real Estate">
  <meta property="og:description" content="Homes, families, and community in Wichita Falls, TX.">
  <meta property="og:image" content="https://kaylebaker.com/images/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css?v=4">
  <link rel="stylesheet" href="portfolio.css?v=4">
</head>
<body>

  <!-- ── Navigation ─────────────────────────────────────── -->
  <nav class="nav" id="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo">The <span>Bakers</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/about/#kayla">Kayla · The Agent</a>
        <a href="/jared/">Jared · The Golfer</a>
        <a href="/portfolio/" class="active">Active Listings</a>
        <a href="/contact/">Contact</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navLinks">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <main>

    <!-- ── Listings ───────────────────────────────────────── -->
    <section class="listings-section" aria-label="Active listings">
      <div class="listings-backdrop"></div>
      <div class="container listings-content">
          <p class="eyebrow eyebrow--light">Active Listings</p>
          <h2>Browse current properties.</h2>
          <p>View Kayle's active listings directly on the MLS.</p>
          <div class="listings-btns">
            <a href="https://www.realtorwf.com/kayle-parks/" target="_blank" rel="noopener noreferrer" class="btn btn--light">Paramount Real Estate</a>
            <a href="https://www.har.com/kayle-byrne-parks/agent_wfartx-2036" target="_blank" rel="noopener noreferrer" class="btn btn--outline-light">HAR Listings</a>
          </div>
      </div>
    </section>



  </main>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Okeke LLC · All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');

    navToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('active');
      navToggle.setAttribute('aria-expanded', String(isOpen));
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

  </script>

</body>
</html>
